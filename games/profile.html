    <div style="flex:1; min-width:0;">
      <header class="top-bar hide-desktop"><span class="top-bar__brand">Profile</span></header>

      <main id="main-content" class="app-main">
        <div class="container section">
          <div class="cluster" style="margin-bottom: var(--space-6);">
            <div class="avatar avatar--lg" id="profile-avatar" aria-hidden="true">S</div>
            <div>
              <h1 id="profile-name">Student</h1>
              <p class="text-body-sm" id="profile-meta">Class — · —</p>
            </div>
          </div>

          <div role="tablist" class="tabs" aria-label="Profile sections">
            <button role="tab" class="tab" id="tab-analytics" aria-selected="true" aria-controls="panel-analytics">Analytics</button>
            <button role="tab" class="tab" id="tab-achievements" aria-selected="false" aria-controls="panel-achievements" tabindex="-1">Achievements</button>
            <button role="tab" class="tab" id="tab-certificates" aria-selected="false" aria-controls="panel-certificates" tabindex="-1">Certificates</button>
          </div>

          <div role="tabpanel" id="panel-analytics" aria-labelledby="tab-analytics" class="stack-lg" style="margin-top: var(--space-5);">
            <section id="analytics-weekly" aria-labelledby="weekly-heading">
              <h2 id="weekly-heading">This Week</h2>
              <div class="card-grid" style="margin-top: var(--space-3);">
                <div class="card card--stat"><span class="card--stat__value" data-field="accuracy">—</span><span class="card--stat__label">Accuracy</span></div>
                <div class="card card--stat"><span class="card--stat__value" data-field="sessions">—</span><span class="card--stat__label">Sessions</span></div>
              </div>
            </section>
            <section id="analytics-monthly" aria-labelledby="monthly-heading">
              <h2 id="monthly-heading">This Month</h2>
              <div class="card cluster" style="margin-top: var(--space-3); justify-content: space-between;">
                <span data-field="accuracy" class="text-h3" style="font-size: 28px; font-weight:700;">—</span>
                <span data-field="delta" class="badge badge--neutral">—</span>
              </div>
            </section>
            <section id="analytics-lifetime" aria-labelledby="lifetime-heading">
              <h2 id="lifetime-heading">Lifetime</h2>
              <div class="card-grid" style="margin-top: var(--space-3);">
                <div class="card card--stat"><span class="card--stat__value" data-field="xp">—</span><span class="card--stat__label">Total XP</span></div>
                <div class="card card--stat"><span class="card--stat__value" data-field="certificates">—</span><span class="card--stat__label">Certificates</span></div>
                <div class="card card--stat"><span class="card--stat__value" data-field="streak">—</span><span class="card--stat__label">Longest streak</span></div>
              </div>
            </section>
          </div>

          <div role="tabpanel" id="panel-achievements" aria-labelledby="tab-achievements" hidden style="margin-top: var(--space-5);">
            <div id="achievements-grid" class="card-grid"></div>
          </div>

          <div role="tabpanel" id="panel-certificates" aria-labelledby="tab-certificates" hidden style="margin-top: var(--space-5);">
            <div id="certificates-grid" class="card-grid"></div>
          </div>
        </div>
      </main>

  <script>
    document.addEventListener('wha:ready', function () {
      var tabs = Utils.qsa('[role="tab"]');
      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          tabs.forEach(function (t) { t.setAttribute('aria-selected', 'false'); t.tabIndex = -1; Utils.qs('#' + t.getAttribute('aria-controls')).hidden = true; });
          tab.setAttribute('aria-selected', 'true'); tab.tabIndex = 0;
          Utils.qs('#' + tab.getAttribute('aria-controls')).hidden = false;
        });
        tab.addEventListener('keydown', function (e) {
          var idx = tabs.indexOf(tab);
          if (e.key === 'ArrowRight') tabs[(idx + 1) % tabs.length].focus();
          if (e.key === 'ArrowLeft') tabs[(idx - 1 + tabs.length) % tabs.length].focus();
        });
      });
      var studentId = Storage.getStudentId();
      if (studentId) {
        Utils.qs('#profile-name').textContent = studentId;
        Utils.qs('#profile-avatar').textContent = studentId.charAt(0);
      }
    });
  </script>
