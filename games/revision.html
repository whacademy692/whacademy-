<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Revision Center — W.H. Academy</title>
  <meta name="theme-color" content="#3730a3">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="app-shell app-shell--with-sidebar">
    <nav class="sidebar" aria-label="Primary">
      <a href="dashboard.html" class="top-bar__brand text-display">W.H. Academy</a>
      <div class="sidebar__nav">
        <a class="sidebar__item" href="dashboard.html" data-nav-page="dashboard.html">Dashboard</a>
        <a class="sidebar__item" href="games.html" data-nav-page="games.html">Classes</a>
        <a class="sidebar__item" href="revision.html" data-nav-page="revision.html" aria-current="page">Revision</a>
        <a class="sidebar__item" href="leaderboard.html" data-nav-page="leaderboard.html">Ranks</a>
        <a class="sidebar__item" href="profile.html" data-nav-page="profile.html">Profile</a>
      </div>
      <div style="margin-top:auto;">
        <button class="sidebar__item" style="width:100%;" data-action="logout">Log Out</button>
      </div>
    </nav>

    <div style="flex:1; min-width:0;">
      <header class="top-bar hide-desktop"><span class="top-bar__brand">Revision</span></header>

      <main id="main-content" class="app-main">
        <div class="container section">
          <h1>Revision Center</h1>

          <div id="revision-skeleton" class="stack" style="margin-top: var(--space-5);">
            <div class="skeleton skeleton--card"></div>
            <div class="skeleton skeleton--card"></div>
          </div>

          <div id="revision-content" class="stack-lg" style="margin-top: var(--space-5);" hidden>
            <section aria-labelledby="due-heading">
              <h2 id="due-heading">Due Now</h2>
              <div id="due-items-list" class="stack-sm" style="margin-top: var(--space-3);"></div>
            </section>

            <section aria-labelledby="focus-heading">
              <h2 id="focus-heading">Focus Areas</h2>
              <div id="weak-topics-panel" class="stack-sm" style="margin-top: var(--space-3);"></div>
            </section>

            <section aria-labelledby="wrong-heading">
              <h2 id="wrong-heading">Wrong Answers Review</h2>
              <div id="wrong-answers-list" class="stack-sm" style="margin-top: var(--space-3);"></div>
            </section>
          </div>
        </div>
      </main>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Primary">
    <a class="bottom-nav__item" href="dashboard.html" data-nav-page="dashboard.html">Home</a>
    <a class="bottom-nav__item" href="games.html" data-nav-page="games.html">Classes</a>
    <a class="bottom-nav__item" href="revision.html" data-nav-page="revision.html" aria-current="page">Revision</a>
    <a class="bottom-nav__item" href="leaderboard.html" data-nav-page="leaderboard.html">Ranks</a>
    <a class="bottom-nav__item" href="profile.html" data-nav-page="profile.html">Profile</a>
  </nav>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/notifications.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/revision.js"></script>
</body>
</html>
