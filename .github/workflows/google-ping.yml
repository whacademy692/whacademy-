# ============================================================
# W.H. Academy — Auto Google Ping Action
# Yeh action automatically Google ko notify karta hai
# jab bhi GitHub pe koi bhi file push ho
# File location: .github/workflows/google-ping.yml
# ============================================================

name: Ping Google After Deploy

# Trigger: jab bhi main/master branch pe push ho
on:
  push:
    branches:
      - main
      - master

jobs:
  ping-google:
    name: Notify Google of sitemap update
    runs-on: ubuntu-latest

    steps:
      # Step 1: Google Search Console ko sitemap ka URL bhejo
      # Yeh Google ko signal deta hai ke content update hua hai
      - name: Ping Google with sitemap URL
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://whacademy692.github.io/whacademy-/sitemap.xml"
          echo "✅ Google ko sitemap ping successfully send ho gayi!"

      # Step 2: Bing ko bhi ping karo (bonus — extra search engine coverage)
      - name: Ping Bing with sitemap URL
        run: |
          curl -s "https://www.bing.com/ping?sitemap=https://whacademy692.github.io/whacademy-/sitemap.xml"
          echo "✅ Bing ko bhi ping send ho gayi!"
